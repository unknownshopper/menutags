<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sr Chorizo — Encargado</title>
    <meta name="description" content="Vista de encargado: seleccionar mesa/sala/periquera, tomar pedidos, entregar y cobrar." />
    <meta name="theme-color" content="#0b1220" />

    <link rel="stylesheet" href="style.css" />
</head>

<body class="mt-theme-srchorizo">
    <div class="mt-container">
        <header class="mt-header">
            <div class="mt-header-left">
                <img class="mt-logo" src="srchorizo.png" alt="Sr Chorizo" />
                <div class="mt-header-text">
                    <div class="mt-brand">MenuTags</div>
                    <h1>Meseros</h1>
                </div>
            </div>
            <div class="mt-actions">
                <a class="mt-pill" href="srchorizocaja.html">Caja</a>
                <a class="mt-btn" href="srchorizoreporte.html">Reporte</a>
            </div>
        </header>

        <main class="mt-main">
            <section class="mt-section" id="sceAuth">
                <h2>Acceso mesero</h2>
                <div class="mt-row" style="margin-top:12px; gap:10px; flex-wrap:wrap; align-items:flex-end;">
                    <label style="display:flex; flex-direction:column; gap:6px;">
                        <span class="mt-brand">Email</span>
                        <input class="mt-input" type="email" id="sceEmail" autocomplete="username" />
                    </label>
                    <label style="display:flex; flex-direction:column; gap:6px;">
                        <span class="mt-brand">Contraseña</span>
                        <input class="mt-input" type="password" id="scePass" autocomplete="current-password" />
                    </label>
                    <div class="mt-row" style="gap:10px; flex-wrap:wrap;">
                        <button class="mt-btn" type="button" id="sceLogin">Entrar</button>
                        <button class="mt-pill" type="button" id="sceLogout" style="display:none;">Salir</button>
                    </div>
                </div>
                <div class="mt-status" id="sceAuthStatus" style="margin-top:12px;">No has iniciado sesión.</div>
            </section>

            <div id="sceApp" style="display:none;">
            <section class="mt-section" id="sceFunnel">
                <h2>Flujo</h2>
                <div class="mt-row" style="gap:10px; flex-wrap:wrap; align-items:center;">
                    <div class="mt-status" id="sceSelected">Selecciona un asiento</div>
                    <label style="display:flex; flex-direction:column; gap:6px; min-width: 150px;">
                        <span class="mt-brand">Cuenta</span>
                        <select class="mt-input" id="sceTab" disabled></select>
                    </label>
                    <button class="mt-pill" type="button" id="sceNewTab" disabled>Abrir cuenta</button>
                    <button class="mt-btn" type="button" id="sceTakeOrder" disabled>Tomar pedido</button>
                    <button class="mt-pill" type="button" id="scePreclose" disabled>Pre-cerrar</button>
                    <button class="mt-pill" type="button" id="sceReopen" disabled>Reabrir</button>
                    <button class="mt-pill" type="button" id="sceClear" disabled>Limpiar</button>
                </div>
                <div class="mt-status" id="sceNote" style="margin-top:12px; opacity:0.92;">
                    Este tablero se sincroniza con Firestore.
                </div>
            </section>

            <section class="mt-section" id="sceMap">
                <h2>Croquis</h2>

                <div class="mt-grid" style="grid-template-columns: 1fr; gap: 14px;">
                    <section class="mt-section" style="margin:0;">
                        <h3>Mesas</h3>
                        <div class="sce-grid" data-group="me"></div>
                    </section>

                    <section class="mt-section" style="margin:0;">
                        <h3>Periqueras</h3>
                        <div class="sce-grid" data-group="pe"></div>
                    </section>

                    <section class="mt-section" style="margin:0;">
                        <h3>Salas</h3>
                        <div class="sce-grid" data-group="sa"></div>
                    </section>

                    <section class="mt-section" style="margin:0;">
                        <h3>Barra / Mesón</h3>
                        <div class="sce-grid" data-group="ba"></div>
                        <div class="sce-grid" data-group="ms" style="margin-top:10px;"></div>
                    </section>
                </div>
            </section>

            <section class="mt-section" id="sceList">
                <h2>Estado</h2>
                <ul id="sceOpenList"></ul>
            </section>

            <div class="mt-footer">
                <a href="https://menutags.unknownshoppers.com/" target="_blank" rel="noopener">MENUTAGS</a>
                by
                <a href="https://unknownshoppers.com/" target="_blank" rel="noopener">The Unknown Shopper</a>
            </div>
            </div>
        </main>
    </div>

    <script type="module" src="firebase.js"></script>
    <script src="script.js"></script>
    <script>
        (function () {
            var RESTAURANT_ID = "srchorizo";

            function safeJsonParse(text, fallback) {
                try { return JSON.parse(text); } catch (e) { return fallback; }
            }

            function getWaiterIdFromEmail(email) {
                var e = String(email || "").trim().toLowerCase();
                if (!e) return null;
                var at = e.indexOf("@");
                if (at === -1) return e;
                return e.slice(0, at);
            }

            function pad2(n) {
                return String(n < 10 ? "0" + n : n);
            }

            function seatId(prefix, idx) {
                return String(prefix) + pad2(idx);
            }

            function nowIso() {
                return new Date().toISOString();
            }

            function qs(id) { return document.getElementById(id); }

            var selectedEl = qs("sceSelected");
            var tabSel = qs("sceTab");
            var newTabBtn = qs("sceNewTab");
            var takeBtn = qs("sceTakeOrder");
            var precloseBtn = qs("scePreclose");
            var reopenBtn = qs("sceReopen");
            var clearBtn = qs("sceClear");
            var openList = qs("sceOpenList");

            var emailEl = qs("sceEmail");
            var passEl = qs("scePass");
            var loginBtn = qs("sceLogin");
            var logoutBtn = qs("sceLogout");
            var authStatusEl = qs("sceAuthStatus");
            var appWrap = qs("sceApp");

            var selectedSeat = null;
            var selectedTab = null;
            var waiterId = null;
            var tabsBySeat = {};

            function setAuthStatus(text) {
                if (authStatusEl) authStatusEl.textContent = text || "";
            }

            function setAppVisible(visible) {
                if (appWrap) appWrap.style.display = visible ? "" : "none";
            }

            function getSeatState(seat) {
                return tabsBySeat[String(seat || "")] || null;
            }

            function ensureSeatLocal(seat) {
                if (!tabsBySeat[seat]) {
                    tabsBySeat[seat] = { seat: seat, tabs: [] };
                }
                return tabsBySeat[seat];
            }

            function setSelectedTab(tab) {
                selectedTab = tab || null;
                render();
            }

            function renderTabsForSeat(seat) {
                if (!tabSel) return;
                if (!seat) {
                    tabSel.innerHTML = "";
                    return;
                }
                var s = ensureSeatLocal(seat);
                var tabs = s.tabs || [];
                tabSel.innerHTML = tabs
                    .map(function (t) {
                        var label = (t && t.label) ? String(t.label) : "Cuenta";
                        var status = (t && t.status) ? String(t.status) : "";
                        var suffix = status ? (" · " + status) : "";
                        return '<option value="' + String(t.id) + '">' + label + suffix + "</option>";
                    })
                    .join("");

                if (!selectedTab || !tabs.some(function (t) { return t && t.id === selectedTab; })) {
                    selectedTab = (tabs[0] && tabs[0].id) ? tabs[0].id : null;
                }
                if (selectedTab) tabSel.value = selectedTab;
            }

            function openNewTabForSeat(seat) {
                if (!seat || !window.mtFirebase || !window.mtFirebase.createTab) return;
                var data = {
                    tableNo: String(seat),
                    status: "open",
                    openedBy: waiterId,
                };
                window.mtFirebase
                    .createTab(RESTAURANT_ID, data)
                    .then(function (ref) {
                        selectedTab = ref && ref.id ? ref.id : selectedTab;
                        refreshTabs();
                    })
                    .catch(function () {
                        setAuthStatus("No se pudo abrir cuenta.");
                    });
            }

            function updateSelectedTabStatus(nextStatus) {
                if (!selectedTab || !window.mtFirebase || !window.mtFirebase.updateTab) return;
                var patch = { status: String(nextStatus || "") };
                if (nextStatus === "preclosed") {
                    patch.preclosedAt = new Date().toISOString();
                    patch.preclosedBy = waiterId;
                }
                if (nextStatus === "open") {
                    patch.reopenedAt = new Date().toISOString();
                    patch.reopenedBy = waiterId;
                }
                window.mtFirebase
                    .updateTab(RESTAURANT_ID, selectedTab, patch)
                    .then(function () {
                        refreshTabs();
                    })
                    .catch(function () {
                        setAuthStatus("No se pudo actualizar la cuenta.");
                    });
            }

            function clearSeat(seat) {
                if (selectedSeat === seat) selectedSeat = null;
                if (selectedSeat === seat) selectedTab = null;
                render();
            }

            function selectSeat(seat) {
                selectedSeat = seat;
                ensureSeatLocal(seat);
                render();
            }

            function statusLabel(status) {
                if (status === "open") return "Abierta";
                if (status === "preclosed") return "Pre-cerrada";
                if (status === "closed") return "Cerrada";
                return "Libre";
            }

            function statusTone(status) {
                if (status === "open") return "rgba(245, 158, 11, 0.20)";
                if (status === "preclosed") return "rgba(59, 130, 246, 0.18)";
                if (status === "closed") return "rgba(34, 197, 94, 0.18)";
                return "rgba(255,255,255,0.06)";
            }

            function buildSeatButton(seat) {
                var seatState = getSeatState(seat);
                var status = seatState && seatState.status ? String(seatState.status) : "idle";
                var btn = document.createElement("button");
                btn.type = "button";
                btn.className = "mt-pill";
                btn.textContent = seat;
                btn.style.padding = "10px 12px";
                btn.style.borderRadius = "12px";
                btn.style.fontWeight = "800";
                btn.style.background = statusTone(status);
                btn.style.border =
                    selectedSeat === seat
                        ? "2px solid rgba(255,255,255,0.58)"
                        : "1px solid rgba(255,255,255,0.12)";
                btn.addEventListener("click", function () { selectSeat(seat); });
                return btn;
            }

            function fillGroup(container, prefix, count) {
                container.innerHTML = "";
                container.style.display = "grid";
                container.style.gridTemplateColumns = "repeat(auto-fit, minmax(92px, 1fr))";
                container.style.gap = "10px";
                for (var i = 1; i <= count; i++) {
                    container.appendChild(buildSeatButton(seatId(prefix, i)));
                }
            }

            function renderOpenList() {
                if (!openList) return;
                var keys = Object.keys(tabsBySeat || {});
                keys.sort();
                if (!keys.length) {
                    openList.innerHTML = "<li>No hay asientos activos.</li>";
                    return;
                }
                openList.innerHTML = keys.map(function (k) {
                    var s = tabsBySeat[k] || {};
                    var status = s && s.status ? String(s.status) : "idle";
                    var t = s && s.updatedAt ? new Date(s.updatedAt).toLocaleString() : "";
                    return (
                        "<li>" +
                        "<div class=\"mt-row\" style=\"justify-content:space-between; gap:10px; flex-wrap:wrap;\">" +
                        "<div><strong>" + k + "</strong><div style=\"opacity:0.85; margin-top:4px;\">" +
                        statusLabel(status) + (t ? " · " + t : "") +
                        "</div></div>" +
                        "<div class=\"mt-row\" style=\"gap:10px; flex-wrap:wrap;\">" +
                        "<button class=\"mt-pill\" type=\"button\" data-action=\"sel\" data-seat=\"" + k + "\">Ver</button>" +
                        "<button class=\"mt-pill\" type=\"button\" data-action=\"clear\" data-seat=\"" + k + "\">Limpiar</button>" +
                        "</div>" +
                        "</div>" +
                        "</li>"
                    );
                }).join("");
            }

            function render() {
                if (selectedEl) {
                    selectedEl.textContent = selectedSeat ? ("Seleccionado: " + selectedSeat) : "Selecciona un asiento";
                }

                var has = !!selectedSeat;
                if (tabSel) tabSel.disabled = !has;
                if (newTabBtn) newTabBtn.disabled = !has;
                if (takeBtn) takeBtn.disabled = !has;
                if (precloseBtn) precloseBtn.disabled = !has;
                if (reopenBtn) reopenBtn.disabled = !has;
                if (clearBtn) clearBtn.disabled = !has;

                renderTabsForSeat(selectedSeat);

                var groups = document.querySelectorAll(".sce-grid");
                for (var g = 0; g < groups.length; g++) {
                    var group = groups[g];
                    var prefix = group.getAttribute("data-group") || "";
                    if (prefix === "me") fillGroup(group, "me", 6);
                    if (prefix === "pe") fillGroup(group, "pe", 4);
                    if (prefix === "sa") fillGroup(group, "sa", 2);
                    if (prefix === "ba") fillGroup(group, "ba", 1);
                    if (prefix === "ms") fillGroup(group, "ms", 1);
                }

                renderOpenList();
            }

            if (takeBtn) {
                takeBtn.addEventListener("click", function () {
                    if (!selectedSeat) return;
                    var tab = (tabSel && tabSel.value) ? String(tabSel.value) : "";
                    if (!tab) return;
                    window.location.href = "srchorizo.html?table=" + encodeURIComponent(selectedSeat) + "&tab=" + encodeURIComponent(tab) + "&waiter=" + encodeURIComponent(waiterId || "");
                });
            }

            if (tabSel) {
                tabSel.addEventListener("change", function () {
                    setSelectedTab(tabSel.value);
                });
            }

            if (newTabBtn) {
                newTabBtn.addEventListener("click", function () {
                    if (!selectedSeat) return;
                    openNewTabForSeat(selectedSeat);
                });
            }

            if (precloseBtn) {
                precloseBtn.addEventListener("click", function () {
                    if (!selectedSeat || !selectedTab) return;
                    updateSelectedTabStatus("preclosed");
                });
            }

            if (reopenBtn) {
                reopenBtn.addEventListener("click", function () {
                    if (!selectedSeat || !selectedTab) return;
                    updateSelectedTabStatus("open");
                });
            }

            if (clearBtn) {
                clearBtn.addEventListener("click", function () {
                    if (!selectedSeat) return;
                    clearSeat(selectedSeat);
                });
            }

            function refreshTabs() {
                if (!window.mtFirebase || !window.mtFirebase.listTabsByStatus) return;
                window.mtFirebase
                    .listTabsByStatus(RESTAURANT_ID, null, 400)
                    .then(function (tabs) {
                        tabsBySeat = {};
                        (tabs || []).forEach(function (t) {
                            var seat = t && t.tableNo ? String(t.tableNo) : "";
                            if (!seat) return;
                            if (!tabsBySeat[seat]) tabsBySeat[seat] = { seat: seat, tabs: [], status: "idle", updatedAt: null };
                            tabsBySeat[seat].tabs.push({ id: t.id, label: t.id.slice(0, 6), status: t.status || "" });
                            tabsBySeat[seat].status = t.status || tabsBySeat[seat].status;
                            var ts = t.updatedAt || t.preclosedAt || t.openedAt || null;
                            var ms = ts && typeof ts.toDate === "function" ? ts.toDate().toISOString() : (ts || null);
                            tabsBySeat[seat].updatedAt = ms;
                        });
                        render();
                    })
                    .catch(function () {
                        setAuthStatus("No se pudo leer cuentas.");
                    });
            }

            function setupAuthUi() {
                if (!window.mtFirebase || !window.mtFirebase.onAuthStateChanged) {
                    setAuthStatus("Firebase no está disponible.");
                    return;
                }

                window.mtFirebase.onAuthStateChanged(function (user) {
                    if (user) {
                        waiterId = getWaiterIdFromEmail(user.email);
                        if (logoutBtn) logoutBtn.style.display = "inline-flex";
                        setAuthStatus("Sesión activa: " + String(waiterId || "mesero"));
                        setAppVisible(true);
                        refreshTabs();
                    } else {
                        waiterId = null;
                        tabsBySeat = {};
                        selectedSeat = null;
                        selectedTab = null;
                        if (logoutBtn) logoutBtn.style.display = "none";
                        setAuthStatus("No has iniciado sesión.");
                        setAppVisible(false);
                        render();
                    }
                });

                if (loginBtn) {
                    loginBtn.addEventListener("click", function () {
                        var email = (emailEl && emailEl.value) ? String(emailEl.value).trim() : "";
                        var pass = (passEl && passEl.value) ? String(passEl.value) : "";
                        if (!email || !pass || !window.mtFirebase || !window.mtFirebase.loginOwner) {
                            setAuthStatus("Escribe email y contraseña.");
                            return;
                        }
                        setAuthStatus("Iniciando sesión...");
                        window.mtFirebase
                            .loginOwner(email, pass)
                            .catch(function () {
                                setAuthStatus("No se pudo iniciar sesión.");
                            });
                    });
                }

                if (logoutBtn) {
                    logoutBtn.addEventListener("click", function () {
                        if (!window.mtFirebase || !window.mtFirebase.logout) return;
                        window.mtFirebase.logout();
                    });
                }
            }

            function setupAuthUiWhenReady() {
                if (window.mtFirebase && window.mtFirebase.onAuthStateChanged) {
                    setupAuthUi();
                    return;
                }
                var p = window.mtFirebaseReady && window.mtFirebaseReady.then ? window.mtFirebaseReady : null;
                if (p) {
                    p.then(function () {
                        setupAuthUi();
                    }).catch(function () {
                        setAuthStatus("Firebase no está disponible.");
                    });
                    return;
                }
                var tries = 0;
                var timer = window.setInterval(function () {
                    tries++;
                    if (window.mtFirebase && window.mtFirebase.onAuthStateChanged) {
                        window.clearInterval(timer);
                        setupAuthUi();
                        return;
                    }
                    if (tries > 40) {
                        window.clearInterval(timer);
                        setAuthStatus("Firebase no está disponible.");
                    }
                }, 250);
            }

            if (openList) {
                openList.addEventListener("click", function (e) {
                    var btn = e.target && e.target.closest ? e.target.closest("button[data-action]") : null;
                    if (!btn) return;
                    var action = btn.getAttribute("data-action");
                    var seat = btn.getAttribute("data-seat");
                    if (!seat) return;
                    if (action === "sel") selectSeat(seat);
                    if (action === "clear") clearSeat(seat);
                });
            }

            render();
            setupAuthUiWhenReady();
        })();
</script>
</body>
</html>
