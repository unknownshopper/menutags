<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GGM Casa x Casa</title>
    <link rel="stylesheet" href="ggm.css" />
    <style>
      .mt-privacy{position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom, 0px)); z-index:9999; border:1px solid rgba(255,255,255,0.14); background:rgba(0,0,0,0.72); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-radius:16px; padding:12px; color:rgba(255,255,255,0.86); box-shadow:0 18px 50px rgba(0,0,0,0.42)}
      .mt-privacy__row{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap}
      .mt-privacy__text{font-size:13px; line-height:1.35; color:rgba(255,255,255,0.72)}
      .mt-privacy__btn{cursor:pointer; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.92); padding:9px 12px; font-weight:750; font-size:13px}
    </style>
  </head>
  <body>
    <header class="ggm-header">
      <div class="ggm-header__inner">
        <div class="ggm-brand">GGM</div>
        <div>
          <h1 class="ggm-title">Casa x Casa</h1>
          <div class="ggm-subtitle">Solicitud ciudadana por NFC</div>
        </div>
      </div>
    </header>

    <main class="ggm-main">
      <section class="ggm-card" id="ggmIntro">
        <div class="ggm-row ggm-row--space">
          <div>
            <div class="ggm-label">Brigadista (Tag ID)</div>
            <div class="ggm-pill"><span id="ggmTagId">—</span></div>
          </div>
          <div class="ggm-row">
            <button class="ggm-btn ggm-btn--ghost" id="ggmShareLink" type="button">Compartir enlace</button>
          </div>
        </div>
        <p class="ggm-help">Llena el formulario y envíalo por WhatsApp. Se guarda un respaldo local por si falla la señal.</p>
      </section>

      <section class="ggm-card" id="ggmFormCard">
        <h2 class="ggm-h2">Datos</h2>
        <form id="ggmForm" class="ggm-form">
          <div class="ggm-field">
            <label class="ggm-label" for="ggmName">Nombre</label>
            <input class="ggm-input" id="ggmName" name="name" autocomplete="name" required />
          </div>

          <div class="ggm-field">
            <label class="ggm-label" for="ggmAddress">Dirección</label>
            <input class="ggm-input" id="ggmAddress" name="address" autocomplete="street-address" placeholder="Calle, número, colonia" required />
          </div>

          <h2 class="ggm-h2">Ubicación (mapa)</h2>
          <div class="ggm-row ggm-row--wrap">
            <button class="ggm-btn" id="ggmGetLocation" type="button">Obtener ubicación</button>
            <a class="ggm-btn ggm-btn--ghost" id="ggmOpenMap" href="#" target="_blank" rel="noopener">Abrir mapa</a>
            <button class="ggm-btn ggm-btn--ghost" id="ggmClearLocation" type="button">Quitar ubicación</button>
          </div>

          <input id="ggmLat" name="lat" type="hidden" />
          <input id="ggmLng" name="lng" type="hidden" />
          <input id="ggmMapLink" name="mapLink" type="hidden" />

          <h2 class="ggm-h2">Solicitud</h2>
          <div class="ggm-field">
            <label class="ggm-label" for="ggmRequest">Descripción</label>
            <textarea class="ggm-textarea" id="ggmRequest" name="request" rows="5" placeholder="Describe la solicitud" required></textarea>
          </div>

          <div class="ggm-row ggm-row--wrap ggm-actions">
            <button class="ggm-btn ggm-btn--primary" id="ggmSend" type="submit">Enviar por WhatsApp</button>
            <button class="ggm-btn" id="ggmSaveDraft" type="button">Guardar respaldo</button>
            <button class="ggm-btn ggm-btn--danger" id="ggmClearDraft" type="button">Limpiar</button>
          </div>

          <div class="ggm-status" id="ggmStatus" aria-live="polite"></div>
        </form>
      </section>

      <section class="ggm-card" id="ggmHistoryCard">
        <div class="ggm-row ggm-row--space">
          <h2 class="ggm-h2" style="margin:0">Historial local</h2>
          <div class="ggm-row ggm-row--wrap">
            <button class="ggm-btn ggm-btn--ghost" id="ggmExport" type="button">Exportar JSON</button>
            <button class="ggm-btn ggm-btn--ghost" id="ggmClearHistory" type="button">Borrar historial</button>
          </div>
        </div>
        <ul class="ggm-list" id="ggmHistory"></ul>
      </section>
      <footer style="margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.72); font-size: 12px;">
        <a href="https://menutags.unknownshoppers.com/" target="_blank" rel="noopener" style="color: rgba(250,204,21,.9); text-decoration: none;">MENUTAGS</a> by <a href="https://unknownshoppers.com/" target="_blank" rel="noopener" style="color: rgba(250,204,21,.9); text-decoration: none;">The Unknown Shopper</a>
      </footer>
    </main>

    <script src="ggm.js"></script>
    <script>
      (function () {
        var KEY = 'mt:privacy:ack:v1';
        function safeGet(){ try { return localStorage.getItem(KEY); } catch(e){ return null; } }
        function safeSet(){ try { localStorage.setItem(KEY,'1'); } catch(e){} }
        if (safeGet() === '1') return;
        if (document.getElementById('mtPrivacy')) return;
        var banner = document.createElement('div');
        banner.id = 'mtPrivacy';
        banner.className = 'mt-privacy';
        banner.innerHTML = '<div class="mt-privacy__row">' +
          '<div class="mt-privacy__text"><strong>Aviso de privacidad:</strong> no recopilamos ni vendemos datos personales. Este sitio puede guardar en tu dispositivo información técnica (localStorage) para recordar preferencias y facilitar el uso. Puedes borrarla desde la configuración de tu navegador.</div>' +
          '<div><button class="mt-privacy__btn" type="button" id="mtPrivacyOk">Aceptar</button></div>' +
        '</div>';
        document.body.appendChild(banner);
        var ok = document.getElementById('mtPrivacyOk');
        if (ok) ok.addEventListener('click', function(){ safeSet(); if (banner && banner.parentNode) banner.parentNode.removeChild(banner); });
      })();
    </script>
  </body>
</html>
